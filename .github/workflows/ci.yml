name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

# NOTE: the lint/type/test jobs are gated on the presence of `pyproject.toml`.
# Until the package skeleton lands (milestone 2.0), they are skipped and CI
# stays green; they activate automatically once `pyproject.toml` exists.

jobs:
  lint:
    name: Lint & type-check
    runs-on: ubuntu-latest
    if: ${{ hashFiles('pyproject.toml') != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Ruff (format check)
        run: ruff format --check .
      - name: Ruff (lint)
        run: ruff check .
      - name: Mypy
        run: mypy src

  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    if: ${{ hashFiles('pyproject.toml') != '' }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package with dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run tests
        run: pytest -m "not network" --cov=endurancepy --cov-report=term-missing
