name: probe-alkamel

on:
  workflow_dispatch:
  push:
    branches: ["claude/sweet-brahmagupta-0zia6b"]

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Probe event names in season page
        run: |
          python3 - <<'PY'
          import urllib.request, urllib.parse, re
          UA = {"User-Agent": "Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 "
                              "(KHTML, like Gecko) Chrome/124.0 Safari/537.36"}

          def get(url, n=3_000_000):
              req = urllib.request.Request(url, headers=UA)
              try:
                  with urllib.request.urlopen(req, timeout=30) as r:
                      return r.status, r.read(n)
              except Exception as e:
                  return None, str(e).encode()

          host = "fiawec.alkamelsystems.com"
          url = f"https://{host}/?season=09_2019-2020"
          st, data = get(url)
          html = data.decode("utf-8", "replace")
          print("status", st, "len", len(html))

          # event-folder-like tokens anywhere (NN_NAME)
          names = sorted(set(re.findall(r'\b\d{2}_[A-Z0-9][A-Za-z0-9 ._\-]{2,40}', html)))
          print("NN_NAME tokens:", names)

          for needle in ['evvent', 'formSearch', 'treemenu', 'LayersTree', 'changeEvent', 'onclick']:
              i = html.lower().find(needle.lower())
              print(f"\n--- {needle} @ {i} ---")
              if i >= 0:
                  print(repr(html[i-60:i+260]))
          PY