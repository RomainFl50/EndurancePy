name: probe-alkamel

on:
  workflow_dispatch:
  push:
    branches: ["claude/sweet-brahmagupta-0zia6b"]

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Probe event markup
        run: |
          python3 - <<'PY'
          import urllib.request, re
          UA = {"User-Agent": "Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 "
                              "(KHTML, like Gecko) Chrome/124.0 Safari/537.36"}
          req = urllib.request.Request("https://fiawec.alkamelsystems.com/?season=09_2019-2020",
                                       headers=UA)
          html = urllib.request.urlopen(req, timeout=30).read().decode("utf-8", "replace")

          for needle in ['name="evvent"', "name='evvent'", "SILVERSTONE", "07_LE MANS", "LE MANS"]:
              i = html.find(needle)
              print(f"\n===== {needle!r} @ {i} =====")
              if i >= 0:
                  print(repr(html[i-200:i+400]))

          # Dump all <option ...> tags (first 40) to see season/event selects
          opts = re.findall(r'<option[^>]*>[^<]*</option>', html)
          print(f"\n===== {len(opts)} <option> tags (first 40) =====")
          for o in opts[:40]:
              print(" ", o.strip()[:120])
          PY