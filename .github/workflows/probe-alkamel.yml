name: probe-alkamel

on:
  workflow_dispatch:
  push:
    branches: ["claude/sweet-brahmagupta-0zia6b"]

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Probe Al Kamel (v3 - classification headers & season list)
        run: |
          python3 - <<'PY'
          import urllib.request, urllib.error, urllib.parse, re

          UA = {"User-Agent": "Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 "
                              "(KHTML, like Gecko) Chrome/124.0 Safari/537.36"}
          ROOT = "https://fiawec.alkamelsystems.com/"

          def get(url, n=600000):
              req = urllib.request.Request(url, headers=UA)
              try:
                  with urllib.request.urlopen(req, timeout=30) as r:
                      return r.status, r.read(n)
              except urllib.error.HTTPError as e:
                  return e.code, b""
              except Exception as e:
                  return None, str(e).encode()

          def show_csv(url, rows=2):
              st, data = get(url, 4000)
              print(f"=== CSV {st} {urllib.parse.unquote(url)[-90:]}")
              if data:
                  for i, line in enumerate(data.decode("utf-8-sig", "replace").splitlines()[:rows]):
                      print(f"    L{i}: {line[:380]}")

          print("##### CLASSIFICATION HEADERS #####")
          spa = ("Results/08_2018-2019/07_SPA FRANCORCHAMPS/267_FIA WEC/")
          for path in [
              spa + "201905041330_Race/Hour 6/05_Classification_Race_Hour 6.CSV",
              spa + "201905021200_Free Practice 1/03_Classification_Free Practice 1.CSV",
              spa + "201905031540_Qualifying/90_Classification_Qualifying.CSV",
          ]:
              show_csv(ROOT + urllib.parse.quote(path), rows=3)

          # A modern (2025) classification, discovered from the season page.
          st, data = get(ROOT + "?season=14_2025")
          html = data.decode("utf-8", "replace") if data else ""
          modern = re.findall(r'Results/[^"\']*?Classification[^"\']*?\.CSV', html)
          print("##### MODERN CLASSIFICATION (2025) #####  found:", len(modern))
          if modern:
              show_csv(ROOT + urllib.parse.quote(modern[0]), rows=2)

          print("##### SEASON LIST (landing) #####")
          st, data = get(ROOT)
          html = data.decode("utf-8", "replace") if data else ""
          opts = re.findall(r'<option[^>]*value="([^"]+)"[^>]*>([^<]+)</option>', html)
          print("   options:", opts[:40])
          for m in re.findall(r'season["\']?\s*[:=]\s*["\']?([0-9]{2}_[0-9\-]{4,9})', html)[:40]:
              print("   season-token:", m)
          PY