name: probe-alkamel

on:
  workflow_dispatch:
  push:
    branches: ["claude/sweet-brahmagupta-0zia6b"]

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Probe season enumeration
        run: |
          python3 - <<'PY'
          import urllib.request, urllib.error, re
          UA = {"User-Agent": "Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 "
                              "(KHTML, like Gecko) Chrome/124.0 Safari/537.36"}

          def get(url, n=2_000_000):
              req = urllib.request.Request(url, headers=UA)
              try:
                  with urllib.request.urlopen(req, timeout=30) as r:
                      return r.status, r.read(n)
              except Exception as e:
                  return None, str(e).encode()

          for host in ["fiawec.alkamelsystems.com", "elms.alkamelsystems.com"]:
              url = f"https://{host}/"
              st, data = get(url)
              html = data.decode("utf-8", "replace") if data else ""
              print(f"\n===== {host}  status={st}  len={len(html)} =====")
              seasons = sorted(set(re.findall(r'season=([0-9A-Za-z_\-]+)', html)))
              print("season= links:", seasons[:60])
              tokens = sorted(set(re.findall(r'\b\d{2}_\d{4}(?:-\d{4})?\b', html)))
              print("NN_YYYY tokens:", tokens[:60])
              # any script that might hold the menu data
              scripts = re.findall(r'src="([^"]+\.js)"', html)
              print("scripts:", scripts[:15])
              # show a snippet around the first 'season' mention
              i = html.lower().find("season")
              print("snippet@season:", repr(html[i-80:i+200]) if i >= 0 else "none")
              # look for ajax/data endpoints
              print("json/php refs:", sorted(set(re.findall(r'[\w./?=&-]+\.(?:json|php)', html)))[:20])
          PY